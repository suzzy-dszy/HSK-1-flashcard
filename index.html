<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Flashcards</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    #main {
      flex: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 18;
      background: rgba(255, 255, 255, 0.95);
      padding: 8px;
      border-radius: 8px;
    }

    .card {
      width: 300px;
      height: 200px;
      perspective: 1000px;
      position: relative;
      z-index: 20;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #333;
      border-radius: 10px;
      font-size: 40px;
      background: white;
    }

    .card-back {
      transform: rotateY(180deg);
      font-size: 18px;
      flex-direction: column;
      padding: 10px;
    }

    button {
      margin: 10px;
      padding: 12px 18px;
      font-size: 18px;
      cursor: pointer;
    }

    #sidebar {
      flex: 2;
      overflow-y: scroll;
      padding: 10px;
      border-left: 2px solid #ddd;
      z-index: 2;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }

    .grid div {
      padding: 8px;
      text-align: center;
      cursor: pointer;
      border-radius: 5px;
      background: #eee;
    }

    .mobile-grid {
      display: none;
      margin-top: 8px;
    }

    #toggleMobileProgress {
      display: none;
    }

    .answer-buttons {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    #shortcuts {
      margin-top: 6px;
      font-size: 16px;
      color: #222;
      background: rgba(255, 255, 255, 0.8);
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    /* Card indicator */
    #indicator {
      margin-top: 6px;
      font-size: 16px;
      color: #111;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-left: 8px;
    }

    /* Dark mode styles */
    body.dark {
      background: #121212;
      color: #eee;
    }

    body.dark #controls {
      background: rgba(0, 0, 0, 0.7);
    }

    body.dark .card-front,
    body.dark .card-back {
      background: #222;
      color: #fff;
      border-color: #555;
    }

    body.dark #sidebar {
      background: #111;
      color: #eee;
    }

    body.dark .grid div {
      background: #333;
      color: #eee;
    }

    body.dark button {
      background: #444;
      color: #eee;
      border: 1px solid #666;
    }

    body.dark #shortcuts,
    body.dark #indicator {
      background: rgba(0, 0, 0, 0.6);
      color: #eee;
    }

    /* Responsive/mobile adjustments */
    @media (max-width: 700px) {
      body {
        flex-direction: column;
        height: auto;
      }

      #main {
        flex: none;
        padding: 20px;
      }

      #sidebar {
        display: none;
      }

      /* mobile progress panel: shown only when toggled open */
      .mobile-grid {
        display: none;
      }

      .mobile-grid.open {
        display: block;
        max-height: 220px;
        overflow: auto;
        width: 100%;
      }

      /* toggle button visible only on small screens */
      #toggleMobileProgress {
        display: inline-block;
      }

      #controls {
        position: static;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 12px;
      }

      .card {
        width: min(92vw, 420px);
        height: calc(min(92vw, 420px) * 0.62);
      }

      .card-front,
      .card-back {
        font-size: 30px;
      }

      .card-back {
        font-size: 16px;
      }

      button {
        margin: 6px;
        padding: 10px 12px;
        font-size: 16px;
      }

      #shortcuts {
        font-size: 14px;
      }

      #indicator {
        font-size: 14px;
      }

      .grid {
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
      }
    }

    .correct {
      background: #4CAF50 !important;
      color: white;
    }

    .wrong {
      background: #f44336 !important;
      color: white;
    }
  </style>
</head>

<body>

  <div id="main">

    <div id="controls">
      <button onclick="prevCard()">&lt;</button>
      <button onclick="nextCard()">&gt;</button>
      <button onclick="shuffleToggle()">Shuffle/Unshuffle</button>
      <button onclick="resetProgress()">Reset</button>
      <button id="toggleDark" onclick="toggleDarkMode()">Dark Mode</button>
      <div id="indicator">Card 0 / 0</div>
      <div id="shortcuts">
        <small>Space: flip &nbsp;, / . or ← / →: prev/next &nbsp;←: wrong &nbsp;→: correct</small>
      </div>
      <div class="mobile-grid" id="mobileProgress">
        <h4 style="margin:6px 0 6px 0; font-size:14px;">Progress</h4>
        <div class="grid" id="mobileProgressGrid"></div>
      </div>
      <button id="toggleMobileProgress" onclick="toggleMobileProgress()">Progress</button>
    </div>

    <div class="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-front" id="cardFront"></div>
        <div class="card-back" id="cardBack"></div>
      </div>
    </div>

    <div class="answer-buttons">
      <button onclick="markAnswer(true)">Correct</button>
      <button onclick="markAnswer(false)">Wrong</button>
    </div>

  </div>

  <div id="sidebar">
    <h3>Progress</h3>
    <div class="grid" id="progressGrid"></div>
  </div>

  288. 知道 (zhīdào) v - to know
  289. 中国 (Zhōngguó) n - China
  290. 中文 (Zhōngwén) n - Chinese language
  291. 中午 (zhōngwǔ) n - noon
  292. 中学 (zhōngxué) n - middle school
  293. 中学生 (zhōngxuésheng) n - middle school student
  294. 住 (zhù) v - to live, to stay
  295. 桌子 (zhuōzi) n - table
  296. 字 (zì) n - character, word
  297. 坐 (zuò) v - to sit
  298. 做 (zuò) v - to do, to make
  299. 做饭 (zuò fàn) v - to cook
  300. 昨天 (zuótiān) n - yesterday
  `;

    // You can paste full 300 list here if expanding manually later

    let words = [];
    let currentIndex = 0;
    let shuffled = false;
    let progress = [];
    let remaining = []; // indices of cards not yet answered

    function init() {
      const rawLines = RAW_LIST.trim().split("\n");
      rawLines.forEach(line => {
        line = line.replace(/^\s*\d+\.*\s*/, '').trim(); // remove leading numbers

        // split off english meaning after ' - ' if present
        let english = 'Learner meaning';
        let beforeDash = line;
        const dashIndex = line.indexOf(' - ');
        if (dashIndex !== -1) {
          beforeDash = line.slice(0, dashIndex).trim();
          english = line.slice(dashIndex + 3).trim();
        }

        // robustly parse hanzi/pinyin/pos; handle nested parens in pinyin
        let hanzi = '';
        let pinyin = '';
        let pos = '—';
        // look for '(' that denotes start of pinyin; should follow a space so we don't pick
        // parentheses that belong to the hanzi itself (e.g. 没(有)).
        let pinyinOpen = -1;
        const spaceParen = beforeDash.match(/\s\(/);
        if (spaceParen) {
          pinyinOpen = spaceParen.index + 1; // position of '('
        }
        if (pinyinOpen !== -1) {
          // find matching closing parenthesis for this open
          let depth = 0;
          let closeIdx = -1;
          for (let j = pinyinOpen; j < beforeDash.length; j++) {
            if (beforeDash[j] === '(') depth++;
            else if (beforeDash[j] === ')') {
              depth--;
              if (depth === 0) { closeIdx = j; break; }
            }
          }
          if (closeIdx !== -1) {
            hanzi = beforeDash.slice(0, pinyinOpen).trim();
            pinyin = beforeDash.slice(pinyinOpen + 1, closeIdx).trim();
            pos = beforeDash.slice(closeIdx + 1).trim() || '—';
          }
        }
        if (!hanzi) {
          // fallback to older logic if something went wrong
          const lastOpen = beforeDash.lastIndexOf('(');
          const lastClose = beforeDash.lastIndexOf(')');
          if (lastOpen !== -1 && lastClose > lastOpen) {
            hanzi = beforeDash.slice(0, lastOpen).trim();
            pinyin = beforeDash.slice(lastOpen + 1, lastClose).trim();
            const posPart = beforeDash.slice(lastClose + 1).trim();
            pos = posPart ? posPart : '—';
          } else {
            const match = beforeDash.match(/(.+?) \((.+?)\)/);
            if (match) {
              hanzi = match[1].trim();
              pinyin = match[2].trim();
              pos = '—';
            }
          }
        }
        if (hanzi) {
          words.push({ hanzi, pinyin, meaning: english, pos });
        }
      });

      // create blank progress and attempt to load previous state
      progress = new Array(words.length).fill(null);
      const saved = JSON.parse(localStorage.getItem('flashcard_state') || '{}');
      if (saved.progress && Array.isArray(saved.progress) && saved.progress.length === words.length) {
        progress = saved.progress;
      }

      // build remaining list from progress
      remaining = [];
      progress.forEach((val, i) => {
        if (val === null) remaining.push(i);
      });

      // restore index/shuffle if available and valid
      if (saved.currentIndex != null && remaining.includes(saved.currentIndex)) {
        currentIndex = saved.currentIndex;
      } else if (remaining.length > 0) {
        currentIndex = remaining[0];
      }
      if (saved.shuffled != null) shuffled = saved.shuffled;

      buildGrid();
      updateGrid();
      showCard();
      loadDarkMode();
    }

    function showCard() {
      document.getElementById("cardFront").innerText = words[currentIndex].hanzi;
      document.getElementById("cardBack").innerHTML = `
        <div style="font-size:18px;margin-bottom:6px;"><strong>${words[currentIndex].pinyin}</strong></div>
        <div style="font-size:16px;margin-bottom:6px;">${words[currentIndex].meaning}</div>
        <div style="font-style:italic;color:#555;">${words[currentIndex].pos}</div>`;
      document.querySelector(".card").classList.remove("flipped");

      // update indicator: show original list position and remaining count
      const indicator = document.getElementById('indicator');
      if (indicator && words.length) {
        const total = words.length;
        const displayIndex = currentIndex + 1;
        const remainingCount = remaining.length;
        indicator.innerText = `Card ${displayIndex} / ${total} (remaining ${remainingCount})`;
      }
    }

    function flipCard() {
      document.querySelector(".card").classList.toggle("flipped");
    }

    function markAnswer(correct) {
      progress[currentIndex] = correct;
      // remove from remaining
      remaining = remaining.filter(i => i !== currentIndex);
      updateGrid();
      saveState();
      gotoNextUnanswered();
    }

    // manual navigation (via comma/period or mobile controls) travels full list
    function nextCard() {
      if (words.length === 0) return;
      if (shuffled) {
        currentIndex = Math.floor(Math.random() * words.length);
      } else {
        currentIndex = (currentIndex + 1) % words.length;
      }
      saveState();
      showCard();
    }

    function prevCard() {
      if (words.length === 0) return;
      if (shuffled) {
        currentIndex = Math.floor(Math.random() * words.length);
      } else {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
      }
      saveState();
      showCard();
    }

    // jumps to the next card that is still unanswered; used after marking
    function gotoNextUnanswered() {
      if (remaining.length === 0) {
        alert('All cards answered');
        return;
      }
      if (shuffled) {
        const idx = Math.floor(Math.random() * remaining.length);
        currentIndex = remaining[idx];
      } else {
        const pos = remaining.indexOf(currentIndex);
        if (pos === -1 || pos === remaining.length - 1) {
          currentIndex = remaining[0];
        } else {
          currentIndex = remaining[pos + 1];
        }
      }
      saveState();
      showCard();
    }

    function buildGrid() {
      const grid = document.getElementById("progressGrid");
      const mobileGrid = document.getElementById("mobileProgressGrid");
      if (grid) grid.innerHTML = "";
      if (mobileGrid) mobileGrid.innerHTML = "";
      words.forEach((_, i) => {
        const div = document.createElement("div");
        div.innerText = i + 1;
        div.onclick = () => {
          currentIndex = i;
          showCard();
        };
        if (grid) grid.appendChild(div);
        if (mobileGrid) {
          const mobileDiv = div.cloneNode(true);
          mobileDiv.onclick = div.onclick;
          mobileGrid.appendChild(mobileDiv);
        }
      });
      updateGrid();
    }

    function updateGrid() {
      const grid = document.getElementById("progressGrid");
      const mobileGrid = document.getElementById("mobileProgressGrid");
      const gridChildren = grid ? grid.children : [];
      const mobileChildren = mobileGrid ? mobileGrid.children : [];
      progress.forEach((val, i) => {
        if (gridChildren[i]) {
          gridChildren[i].classList.remove("correct", "wrong");
          if (val === true) gridChildren[i].classList.add("correct");
          if (val === false) gridChildren[i].classList.add("wrong");
        }
        if (mobileChildren[i]) {
          mobileChildren[i].classList.remove("correct", "wrong");
          if (val === true) mobileChildren[i].classList.add("correct");
          if (val === false) mobileChildren[i].classList.add("wrong");
        }
      });
    }

    function saveState() {
      const state = { progress, currentIndex, shuffled };
      localStorage.setItem('flashcard_state', JSON.stringify(state));
    }

    function resetProgress() {
      progress = new Array(words.length).fill(null);
      remaining = words.map((_, i) => i);
      currentIndex = 0;
      shuffled = false;
      buildGrid();
      updateGrid();
      showCard();
      saveState();
    }

    function shuffleToggle() {
      shuffled = !shuffled;
      if (!shuffled) {
        currentIndex = 0;
      }
      saveState();
    }

    function toggleMobileProgress() {
      const panel = document.getElementById('mobileProgress');
      if (!panel) return;
      panel.classList.toggle('open');
      const btn = document.getElementById('toggleMobileProgress');
      if (btn) btn.setAttribute('aria-expanded', panel.classList.contains('open'));
    }

    function updateDarkToggleText() {
      const btn = document.getElementById('toggleDark');
      if (!btn) return;
      btn.textContent = document.body.classList.contains('dark')
        ? 'Light Mode'
        : 'Dark Mode';
    }

    function toggleDarkMode() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
      updateDarkToggleText();
    }

    function loadDarkMode() {
      const dark = localStorage.getItem('darkMode') === 'true';
      if (dark) document.body.classList.add('dark');
      updateDarkToggleText();
    }

    // key bindings
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case ' ':
          flipCard();
          e.preventDefault();
          break;
        case 'ArrowRight':
          markAnswer(true);
          break;
        case 'ArrowLeft':
          markAnswer(false);
          break;
        case ',':
          prevCard();
          break;
        case '.':
          nextCard();
          break;
      }
    });

    init();

  </script>
